<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zenith Pro — Ultimate Quran</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080c14'/%3E%3Ccircle cx='14' cy='16' r='8' fill='%2338bdf8'/%3E%3Ccircle cx='17.5' cy='13' r='6' fill='%23080c14'/%3E%3Cpolygon points='24,6 24.9,8.7 27.6,8.7 25.4,10.4 26.3,13 24,11.3 21.7,13 22.6,10.4 20.4,8.7 23.1,8.7' fill='%2338bdf8'/%3E%3C/svg%3E">
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Crimson+Pro:wght@400;600;700&family=Amiri+Quran&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --rail-w: 72px; --panel-w: 340px; --hud-h: 90px;
  --t: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --bg: #05070a; --surf: #0c0f17; --surf2: #161b26;
  --text: #f8fafc; --text2: #94a3b8; --text3: #475569;
  --accent: #38bdf8; --accent-rgb: 56,189,248;
  --grad: linear-gradient(135deg, #38bdf8, #818cf8);
}

[data-theme="emerald"] { --bg: #020604; --surf: #060d0a; --surf2: #0d1a14; --accent: #10b981; --accent-rgb: 16,185,129; --grad: linear-gradient(135deg, #10b981, #059669); }
[data-theme="royal"] { --bg: #0a0510; --surf: #120a1c; --surf2: #1d102e; --accent: #a855f7; --accent-rgb: 168,85,247; --grad: linear-gradient(135deg, #a855f7, #7e22ce); }

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* Layout */
#app { display: flex; height: 100vh; width: 100vw; }
#rail { width: var(--rail-w); background: var(--surf); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 24px 0; z-index: 1000; flex-shrink: 0; }
#content-area { flex: 1; position: relative; overflow: hidden; display: flex; }

/* Navigation */
.logo { width: 44px; height: 44px; border-radius: 12px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; margin-bottom: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.3); transition: 0.3s; }
.logo:hover { transform: rotate(10deg) scale(1.1); }
.nav-btn { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text3); cursor: pointer; transition: 0.2s; margin-bottom: 8px; border: none; background: transparent; }
.nav-btn:hover, .nav-btn.active { color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }

/* Sidebar Panel */
.panel { width: var(--panel-w); background: var(--surf); border-right: 1px solid rgba(255,255,255,0.05); transform: translateX(-100%); transition: transform var(--t); position: absolute; left: 0; top: 0; bottom: 0; z-index: 900; overflow-y: auto; }
.panel.active { transform: translateX(0); }
.panel-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: var(--surf); z-index: 10; }
.search-input { width: 100%; background: var(--surf2); border: 1px solid rgba(255,255,255,0.1); padding: 12px 16px; border-radius: 10px; color: white; outline: none; transition: 0.2s; }
.search-input:focus { border-color: var(--accent); }

/* Viewports */
.viewport { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
.container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

/* Cards & List */
.surah-card { background: var(--surf); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 16px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
.surah-card:hover { border-color: var(--accent); background: var(--surf2); transform: translateX(5px); }
.surah-idx { width: 40px; height: 40px; border-radius: 10px; background: var(--surf2); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }

/* Reader */
.ayah-row { padding: 35px 25px; border-radius: 20px; margin-bottom: 15px; border: 1px solid transparent; transition: 0.4s; }
.ayah-row.playing { background: rgba(var(--accent-rgb), 0.05); border-color: rgba(var(--accent-rgb), 0.2); }
.ar-text { font-family: 'Amiri Quran', serif; font-size: 2.6rem; text-align: right; direction: rtl; line-height: 2.2; margin-bottom: 25px; color: var(--text); }
.en-text { font-size: 1.1rem; color: var(--text2); line-height: 1.8; }
.ayah-tools { display: flex; gap: 10px; margin-top: 25px; }
.tool-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--surf2); color: var(--text2); cursor: pointer; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Playback Bar */
#hud { position: fixed; bottom: 0; left: var(--rail-w); right: 0; height: var(--hud-h); background: rgba(12, 15, 23, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 32px; z-index: 2000; }
.hud-meta { flex: 1; }
.hud-ctrls { display: flex; align-items: center; gap: 20px; flex: 2; justify-content: center; }
.play-main { width: 56px; height: 56px; border-radius: 18px; background: var(--grad); border: none; color: white; cursor: pointer; box-shadow: 0 8px 25px rgba(var(--accent-rgb), 0.3); transition: 0.2s; }
.hud-settings { flex: 1; display: flex; justify-content: flex-end; gap: 15px; align-items: center; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
.modal { background: var(--surf); width: 100%; max-width: 600px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); max-height: 80vh; overflow-y: auto; padding: 32px; }

/* Animations */
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  #rail { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid rgba(255,255,255,0.05); }
  #hud { left: 0; bottom: 70px; padding: 0 15px; }
  #main { margin-left: 0; }
  .viewport { padding-bottom: 160px; }
  .panel { width: 100%; height: calc(100% - 70px); }
  .ar-text { font-size: 2rem; }
}
</style>
</head>
<body>

<div id="app">
  <aside id="rail">
    <div class="logo" onclick="UI.showView('home')">Z</div>
    <button class="nav-btn active" id="n-home" onclick="UI.showView('home')"><i data-lucide="home"></i></button>
    <button class="nav-btn" onclick="UI.togglePanel()"><i data-lucide="search"></i></button>
    <button class="nav-btn" id="n-bookmarks" onclick="UI.showView('bookmarks')"><i data-lucide="bookmark"></i></button>
    <div style="flex:1"></div>
    <button class="nav-btn" onclick="UI.toggleTheme()"><i data-lucide="palette"></i></button>
  </aside>

  <main id="content-area">
    <aside class="panel" id="side-panel">
      <div class="panel-header">
        <h3 style="margin-bottom: 15px;">Surah Index</h3>
        <input type="text" class="search-input" placeholder="Jump to Surah..." oninput="App.filter(this.value)">
      </div>
      <div id="panel-list" style="padding: 15px;"></div>
    </aside>

    <section class="viewport" id="view-home">
      <div class="container">
        <div style="margin-bottom: 50px;">
          <h1 style="font-family:'Crimson Pro'; font-size: 3.5rem; margin-bottom: 10px;">As-Salamu Alaykum</h1>
          <p style="color:var(--text2);">Experience the Quran with Zenith Pro clarity.</p>
        </div>
        <div id="home-grid"></div>
      </div>
    </section>

    <section class="viewport" id="view-reader" style="display:none"></section>

    <section class="viewport" id="view-bookmarks" style="display:none">
        <div class="container">
            <h1 style="font-family:'Crimson Pro'; font-size: 3rem; margin-bottom: 30px;">Bookmarks</h1>
            <div id="bookmarks-list"></div>
        </div>
    </section>
  </main>
</div>

<footer id="hud">
  <div class="hud-meta">
    <div id="hud-title" style="font-weight: 700;">Not Playing</div>
    <div id="hud-sub" style="font-size: 0.8rem; color: var(--text3);">Select an ayah</div>
  </div>
  <div class="hud-ctrls">
    <button class="nav-btn" style="width:40px;" onclick="AudioPlayer.prev()"><i data-lucide="skip-back"></i></button>
    <button class="play-main" id="master-play" onclick="AudioPlayer.toggle()"><i data-lucide="play"></i></button>
    <button class="nav-btn" style="width:40px;" onclick="AudioPlayer.next()"><i data-lucide="skip-forward"></i></button>
  </div>
  <div class="hud-settings">
    <select id="reciter-select" onchange="AudioPlayer.reciter = this.value" style="background:var(--surf2); color:white; border:none; padding:5px; border-radius:5px; font-size:0.8rem;">
        <option value="Alafasy_64kbps">Mishary Alafasy</option>
        <option value="Abdul_Basit_Murattal_64kbps">AbdulBaset Murattal</option>
        <option value="Minshawi_Murattal_128kbps">Siddiq al-Minshawi</option>
    </select>
    <div id="hud-time" style="font-family: monospace; font-size: 0.9rem; color: var(--accent);">0:00</div>
  </div>
</footer>

<div class="modal-overlay" id="modal-overlay" onclick="UI.closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <div id="modal-content"></div>
    </div>
</div>

<script>
// CORE CONFIG
const State = {
  surahs: [],
  bookmarks: JSON.parse(localStorage.getItem('zp-favs')) || [],
  theme: localStorage.getItem('zp-theme') || 'midnight'
};

const AudioPlayer = {
  el: new Audio(),
  playing: false,
  reciter: 'Alafasy_64kbps',
  track: { s: 0, a: 0 },

  init() {
    this.el.ontimeupdate = () => {
      const m = Math.floor(this.el.currentTime / 60);
      const s = Math.floor(this.el.currentTime % 60);
      document.getElementById('hud-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };
    this.el.onended = () => this.next();
  },

  play(s, a) {
    this.track = { s, a };
    const sid = String(s).padStart(3, '0');
    const aid = String(a).padStart(3, '0');
    this.el.src = `https://everyayah.com/data/${this.reciter}/${sid}${aid}.mp3`;
    this.el.play();
    this.playing = true;
    this.sync();
  },

  toggle() {
    if(!this.el.src) return;
    this.playing ? this.el.pause() : this.el.play();
    this.playing = !this.playing;
    this.sync();
  },

  sync() {
    const s = State.surahs.find(x => x.id === this.track.s);
    document.getElementById('hud-title').textContent = s ? s.name_simple : 'Noble Quran';
    document.getElementById('hud-sub').textContent = `Ayah ${this.track.a}`;
    document.querySelector('#master-play i').setAttribute('data-lucide', this.playing ? 'pause' : 'play');
    
    document.querySelectorAll('.ayah-row').forEach(r => r.classList.remove('playing'));
    const active = document.getElementById(`v-${this.track.s}-${this.track.a}`);
    if(active) {
        active.classList.add('playing');
        active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    lucide.createIcons();
  },

  next() {
    const s = State.surahs.find(x => x.id === this.track.s);
    if(s && this.track.a < s.verses_count) this.play(this.track.s, this.track.a + 1);
  },
  prev() { if(this.track.a > 1) this.play(this.track.s, this.track.a - 1); }
};

const UI = {
  showView(name) {
    document.querySelectorAll('.viewport').forEach(v => v.style.display = 'none');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`view-${name}`).style.display = 'block';
    document.getElementById(`n-${name}`)?.classList.add('active');
    document.getElementById('side-panel').classList.remove('active');
  },
  togglePanel() { document.getElementById('side-panel').classList.toggle('active'); },
  toggleTheme() {
    const themes = ['midnight', 'emerald', 'royal'];
    let idx = themes.indexOf(State.theme);
    State.theme = themes[(idx + 1) % themes.length];
    document.documentElement.setAttribute('data-theme', State.theme);
    localStorage.setItem('zp-theme', State.theme);
  },
  showModal(content) {
    document.getElementById('modal-content').innerHTML = content;
    document.getElementById('modal-overlay').style.display = 'flex';
  },
  closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
};

const App = {
  async init() {
    AudioPlayer.init();
    document.documentElement.setAttribute('data-theme', State.theme);
    try {
      const r = await fetch('https://api.quran.com/api/v4/chapters');
      const d = await r.json();
      State.surahs = d.chapters;
      this.renderGrids();
    } catch(e) { console.error(e); }
    lucide.createIcons();
  },

  renderGrids() {
    const html = State.surahs.map(s => `
      <div class="surah-card" onclick="App.loadSurah(${s.id})">
        <div class="surah-idx">${s.id}</div>
        <div style="flex:1">
          <div style="font-weight:700">${s.name_simple}</div>
          <div style="font-size:0.75rem; color:var(--text3)">${s.verses_count} Ayahs</div>
        </div>
        <div style="font-family:'Noto Naskh Arabic'; font-size:1.2rem">${s.name_arabic}</div>
      </div>
    `).join('');
    document.getElementById('panel-list').innerHTML = html;
    document.getElementById('home-grid').innerHTML = html;
  },

  async loadSurah(id) {
    UI.showView('reader');
    const out = document.getElementById('view-reader');
    out.innerHTML = '<div style="display:flex; justify-content:center; padding:100px;"><div class="spin"><i data-lucide="loader-2" size="48" color="var(--accent)"></i></div></div>';
    lucide.createIcons();

    try {
      const [arR, enR] = await Promise.all([
        fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`),
        fetch(`https://api.quran.com/api/v4/quran/translations/131?chapter_number=${id}`)
      ]);
      const ar = await arR.json();
      const en = await enR.json();
      const info = State.surahs.find(x => x.id === id);

      out.innerHTML = `
        <div class="container">
            <div style="text-align:center; margin-bottom:60px;">
                <div style="font-family:'Noto Naskh Arabic'; font-size:4rem; margin-bottom:10px">${info.name_arabic}</div>
                <h1 style="font-family:'Crimson Pro'; font-size:2.5rem; color:var(--accent)">${info.name_simple}</h1>
            </div>
            ${ar.verses.map((v, i) => `
                <div class="ayah-row" id="v-${id}-${i+1}">
                    <div class="ar-text">${v.text_uthmani}</div>
                    <div class="en-text">${en.translations[i].text}</div>
                    <div class="ayah-tools">
                        <button class="tool-btn" onclick="AudioPlayer.play(${id}, ${i+1})"><i data-lucide="play" size="14"></i> Play</button>
                        <button class="tool-btn" onclick="App.loadTafsir(${v.verse_key})"><i data-lucide="book-open" size="14"></i> Tafsir</button>
                        <button class="tool-btn" onclick="App.toggleBookmark(${id}, ${i+1})"><i data-lucide="bookmark" size="14"></i> Save</button>
                    </div>
                </div>
            `).join('')}
        </div>
      `;
      lucide.createIcons();
      out.scrollTo(0,0);
    } catch(e) { out.innerHTML = "Failed to load."; }
  },

  async loadTafsir(key) {
    UI.showModal('<div class="spin" style="text-align:center"><i data-lucide="loader-2"></i></div>');
    lucide.createIcons();
    try {
        const r = await fetch(`https://api.quran.com/api/v4/tafsirs/169/by_verse_key/${key}`);
        const d = await r.json();
        UI.showModal(`
            <h2 style="margin-bottom:20px; color:var(--accent)">Tafsir Ibn Kathir</h2>
            <div style="line-height:1.8; color:var(--text2); font-size:1.1rem">${d.tafsir.text}</div>
        `);
    } catch(e) { UI.showModal("Failed to load Tafsir."); }
  },

  filter(q) {
    const cards = document.querySelectorAll('.panel .surah-card');
    cards.forEach(c => {
        c.style.display = c.textContent.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none';
    });
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
