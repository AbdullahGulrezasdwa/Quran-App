<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zenith Pro — القرآن الكريم</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080c14'/%3E%3Ccircle cx='14' cy='16' r='8' fill='%2338bdf8'/%3E%3Ccircle cx='17.5' cy='13' r='6' fill='%23080c14'/%3E%3Cpolygon points='24,6 24.9,8.7 27.6,8.7 25.4,10.4 26.3,13 24,11.3 21.7,13 22.6,10.4 20.4,8.7 23.1,8.7' fill='%2338bdf8'/%3E%3C/svg%3E">
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&family=Crimson+Pro:wght@400;600;700&family=Amiri+Quran&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --rail-w: 80px; --panel-w: 340px; --hud-h: 90px;
  --bg: #05070a; --surf: #0c0f17; --surf2: #161b26; --surf3: #1f2633;
  --text: #f8fafc; --text2: #94a3b8; --text3: #475569;
  --accent: #38bdf8; --accent-rgb: 56,189,248;
  --border: rgba(255,255,255,0.08);
  --grad: linear-gradient(135deg, #38bdf8, #818cf8);
}

[data-theme="emerald"] {
  --bg: #020604; --surf: #060d0a; --surf2: #0d1a14; --surf3: #162b21;
  --accent: #10b981; --accent-rgb: 16,185,129;
  --grad: linear-gradient(135deg, #10b981, #059669);
}

[data-theme="royal"] {
  --bg: #0a0510; --surf: #120a1c; --surf2: #1d102e; --surf3: #2d1b4e;
  --accent: #a855f7; --accent-rgb: 168,85,247;
  --grad: linear-gradient(135deg, #a855f7, #7e22ce);
}

[data-theme="sunset"] {
  --bg: #100505; --surf: #1c0a0a; --surf2: #2e1212; --surf3: #4a1d1d;
  --accent: #f97316; --accent-rgb: 249,115,22;
  --grad: linear-gradient(135deg, #f97316, #c2410c);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* Layout Architecture */
#app { display: flex; height: 100vh; width: 100vw; }
#rail { width: var(--rail-w); background: var(--surf); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; z-index: 100; flex-shrink: 0; }
#content-area { flex: 1; position: relative; overflow: hidden; display: flex; }

/* Navigation Rail */
.logo { width: 48px; height: 48px; border-radius: 14px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; margin-bottom: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.3); }
.nav-item { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--text3); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 8px; }
.nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(var(--accent-rgb), 0.15); transform: translateY(-2px); }

/* Sidebar Panel */
.side-panel { width: var(--panel-w); background: var(--surf); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
.side-panel.collapsed { width: 0; opacity: 0; pointer-events: none; border-right: none; }
.panel-header { padding: 24px; border-bottom: 1px solid var(--border); }
.search-wrapper { position: relative; }
.search-input { width: 100%; background: var(--surf2); border: 1px solid var(--border); padding: 14px 16px 14px 44px; border-radius: 12px; color: white; font-size: 0.95rem; outline: none; transition: 0.2s; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 18px; }

/* Main Viewport */
.viewport { flex: 1; overflow-y: auto; padding-bottom: calc(var(--hud-h) + 40px); scroll-behavior: smooth; }
.container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

/* Component Styles */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.s-card { background: var(--surf); border: 1px solid var(--border); padding: 18px; border-radius: 16px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.s-card:hover { border-color: var(--accent); background: var(--surf2); transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
.s-idx { width: 40px; height: 40px; border-radius: 12px; background: var(--surf3); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }

/* Reader View */
.reader-header { text-align: center; margin-bottom: 60px; padding: 40px; background: radial-gradient(circle at top, rgba(var(--accent-rgb),0.05), transparent 70%); border-radius: 24px; border: 1px solid var(--border); }
.ar-title { font-family: 'Noto Naskh Arabic', serif; font-size: 4rem; margin-bottom: 12px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.ayah-row { padding: 40px 30px; border-radius: 20px; border: 1px solid transparent; transition: 0.4s; margin-bottom: 10px; }
.ayah-row:hover { background: rgba(255,255,255,0.02); }
.ayah-row.playing { background: rgba(var(--accent-rgb), 0.05); border-color: rgba(var(--accent-rgb), 0.2); transform: scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.ar-text { font-family: 'Amiri Quran', serif; font-size: 2.8rem; text-align: right; direction: rtl; line-height: 2.2; margin-bottom: 24px; color: var(--text); }
.en-text { font-size: 1.15rem; color: var(--text2); line-height: 1.8; font-weight: 400; }
.ayah-meta { display: flex; align-items: center; gap: 12px; margin-top: 30px; color: var(--text3); font-size: 0.85rem; font-weight: 600; }

/* Persist Playback Bar */
#hud { position: fixed; bottom: 0; left: 0; right: 0; height: var(--hud-h); background: rgba(12, 15, 23, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px 0 calc(var(--rail-w) + 32px); z-index: 1000; transition: 0.3s; }
.hud-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
.hud-title { font-weight: 700; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hud-sub { font-size: 0.8rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hud-ctrls { display: flex; align-items: center; gap: 16px; flex: 1; justify-content: center; }
.play-trigger { width: 56px; height: 56px; border-radius: 16px; background: var(--grad); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 25px rgba(var(--accent-rgb), 0.4); transition: 0.2s; }
.play-trigger:hover { transform: scale(1.05); }
.hud-time { flex: 1; text-align: right; font-family: 'IBM Plex Sans', monospace; font-size: 0.9rem; color: var(--text2); font-weight: 600; }

/* Custom Toasts */
#toast-container { position: fixed; bottom: calc(var(--hud-h) + 20px); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast { background: var(--surf3); color: white; padding: 12px 24px; border-radius: 100px; font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), fadeOut 0.3s 2.7s forwards; }

@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 10px; }

/* Mobile Responsiveness */
@media (max-width: 768px) {
  #app { flex-direction: column; }
  #rail { width: 100%; height: 70px; flex-direction: row; padding: 0 15px; justify-content: space-around; border-right: none; border-top: 1px solid var(--border); order: 3; z-index: 1001; }
  .logo { display: none; }
  .nav-item { margin-bottom: 0; width: 45px; height: 45px; }
  .side-panel { position: absolute; left: 0; top: 0; bottom: 0; width: 100%; z-index: 500; }
  .side-panel.collapsed { transform: translateX(-100%); width: 100%; opacity: 1; }
  #hud { bottom: 70px; padding: 0 20px; height: 80px; }
  .hud-time { display: none; }
  .viewport { padding-bottom: calc(var(--hud-h) + 90px); }
  .ar-text { font-size: 2.2rem; }
  #toast-container { bottom: calc(var(--hud-h) + 90px); }
}
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">
  <aside id="rail">
    <div class="logo" onclick="Router.go('home')">Z</div>
    <div class="nav-item active" id="n-home" onclick="Router.go('home')"><i data-lucide="home"></i></div>
    <div class="nav-item" id="n-bookmarks" onclick="Router.go('bookmarks')"><i data-lucide="bookmark"></i></div>
    <div class="nav-item" id="n-search" onclick="UI.toggleSide()"><i data-lucide="search"></i></div>
    <div style="flex:1" class="desktop-only"></div>
    <div class="nav-item" onclick="UI.toggleTheme()"><i data-lucide="palette"></i></div>
  </aside>

  <main id="content-area">
    <aside class="side-panel collapsed" id="side-panel">
      <div class="panel-header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
          <h3 style="font-weight:700">Index</h3>
          <button style="background:none; border:none; color:var(--text3); cursor:pointer;" onclick="UI.toggleSide()"><i data-lucide="x"></i></button>
        </div>
        <div class="search-wrapper">
          <i data-lucide="search" class="search-icon"></i>
          <input type="text" class="search-input" placeholder="Search Surah..." oninput="App.filter(this.value)">
        </div>
      </div>
      <div id="side-list" style="overflow-y:auto; flex:1; padding: 10px 15px;"></div>
    </aside>

    <section class="viewport" id="view-home">
      <div class="container">
        <div style="margin-bottom: 50px;">
          <h1 style="font-family:'Crimson Pro'; font-size: 3.5rem; line-height:1.2; margin-bottom:8px">As-Salamu Alaykum</h1>
          <p style="color:var(--text2); font-size:1.1rem">Continue your spiritual journey.</p>
        </div>
        <div id="recent-box" style="margin-bottom: 50px;"></div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px">
          <h3 style="font-weight:700; font-size:1.4rem">The 114 Surahs</h3>
        </div>
        <div id="main-grid" class="card-grid"></div>
      </div>
    </section>

    <section class="viewport" id="view-reader" style="display:none">
      <div class="container" id="reader-output"></div>
    </section>

    <section class="viewport" id="view-bookmarks" style="display:none">
        <div class="container">
            <h1 style="font-family:'Crimson Pro'; font-size: 3rem; margin-bottom:10px">Your Bookmarks</h1>
            <p style="color:var(--text2); margin-bottom: 40px">Saved verses across devices.</p>
            <div id="bookmarks-output" class="card-grid"></div>
        </div>
    </section>
  </main>
</div>

<footer id="hud">
  <div class="hud-info">
    <div class="hud-title" id="hud-name">Not Playing</div>
    <div class="hud-sub" id="hud-meta">Select an ayah to begin</div>
  </div>
  <div class="hud-ctrls">
    <button class="nav-item" style="margin:0; width:44px; height:44px" onclick="AudioPlayer.prev()"><i data-lucide="skip-back" size="20"></i></button>
    <button class="play-trigger" id="master-play" onclick="AudioPlayer.toggle()"><i data-lucide="play" size="24"></i></button>
    <button class="nav-item" style="margin:0; width:44px; height:44px" onclick="AudioPlayer.next()"><i data-lucide="skip-forward" size="20"></i></button>
  </div>
  <div class="hud-time" id="audio-time">00:00</div>
</footer>

<script>
// --- CORE ENGINE ---

// 1. Audio Engine
const AudioPlayer = {
  el: new Audio(),
  playing: false,
  track: { s: 0, a: 0 },
  
  init() {
    this.el.ontimeupdate = () => {
      const m = Math.floor(this.el.currentTime / 60);
      const s = Math.floor(this.el.currentTime % 60);
      const timeDisplay = document.getElementById('audio-time');
      if (timeDisplay) timeDisplay.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };
    this.el.onended = () => this.next();
  },

  play(s, a) {
    this.track = { s, a };
    const sid = String(s).padStart(3, '0');
    const aid = String(a).padStart(3, '0');
    this.el.src = `https://everyayah.com/data/Alafasy_64kbps/${sid}${aid}.mp3`;
    this.el.play().catch(e => UI.toast("Error playing audio"));
    this.playing = true;
    this.sync();
  },

  toggle() {
    if(!this.el.src) return UI.toast("Please select an Ayah first");
    this.playing ? this.el.pause() : this.el.play();
    this.playing = !this.playing;
    this.sync();
  },

  sync() {
    const s = State.surahs.find(x => x.id === this.track.s);
    const nameEl = document.getElementById('hud-name');
    const metaEl = document.getElementById('hud-meta');
    const btnEl = document.getElementById('master-play');
    
    if (nameEl) nameEl.textContent = s ? s.name_simple : 'Noble Quran';
    if (metaEl) metaEl.textContent = `Ayah ${this.track.a} — Mishary Alafasy`;
    if (btnEl) btnEl.innerHTML = `<i data-lucide="${this.playing ? 'pause' : 'play'}" size="24"></i>`;
    
    // Auto Highlight & Scroll active ayah
    document.querySelectorAll('.ayah-row').forEach(el => el.classList.remove('playing'));
    if(this.track.s > 0 && this.track.a > 0) {
       const activeRow = document.getElementById(`v-${this.track.s}-${this.track.a}`);
       if(activeRow) {
           activeRow.classList.add('playing');
           if(this.playing) {
              activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
           }
       }
    }
    lucide.createIcons();
  },

  next() {
    const s = State.surahs.find(x => x.id === this.track.s);
    if(s && this.track.a < s.verses_count) {
        this.play(this.track.s, this.track.a + 1);
    } else {
        this.playing = false;
        this.sync();
    }
  },
  prev() { 
      if(this.track.a > 1) this.play(this.track.s, this.track.a - 1); 
  }
};

// 2. State Management
const State = {
  surahs: [],
  bookmarks: JSON.parse(localStorage.getItem('zp-favs')) || [],
  last: JSON.parse(localStorage.getItem('zp-last')) || null,
  theme: localStorage.getItem('zp-theme') || 'midnight'
};

// 3. Routing & UI
const Router = {
  go(view) {
    document.querySelectorAll('.viewport').forEach(v => v.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const target = document.getElementById(`view-${view}`);
    if (target) target.style.display = 'block';
    document.getElementById(`n-${view}`)?.classList.add('active');
    
    // Close sidebar on mobile after navigation
    if(window.innerWidth <= 768) {
        document.getElementById('side-panel').classList.add('collapsed');
    }

    if(view === 'bookmarks') UI.renderBookmarks();
    if(view === 'home') UI.renderRecent();
  }
};

const THEMES = ['midnight', 'emerald', 'royal', 'sunset'];

const UI = {
  toast(msg) {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  },

  toggleSide() { 
      document.getElementById('side-panel').classList.toggle('collapsed'); 
  },
  
  toggleTheme() {
    let idx = THEMES.indexOf(State.theme);
    idx = (idx + 1) % THEMES.length;
    State.theme = THEMES[idx];
    document.documentElement.setAttribute('data-theme', State.theme);
    localStorage.setItem('zp-theme', State.theme);
    this.toast(`Theme: ${State.theme.charAt(0).toUpperCase() + State.theme.slice(1)}`);
  },

  renderRecent() {
    const box = document.getElementById('recent-box');
    if(!State.last || !box) return;
    const s = State.surahs.find(x => x.id === State.last.id);
    if (!s) return;
    box.innerHTML = `
      <div class="s-card" style="background:var(--grad); color:white; border:none; padding:24px" onclick="App.load(${s.id}, ${State.last.v || 1})">
        <div class="s-idx" style="background:rgba(255,255,255,0.25); color:white; width:48px; height:48px; font-size:1.1rem">${s.id}</div>
        <div style="flex:1">
          <div style="font-weight:700; font-size:1.1rem; margin-bottom:4px">Continue Reading</div>
          <div style="opacity:0.9; font-size:0.9rem">${s.name_simple} • Ayah ${State.last.v || 1}</div>
        </div>
        <i data-lucide="arrow-right" size="28" style="opacity:0.8"></i>
      </div>
    `;
    lucide.createIcons();
  },

  renderBookmarks() {
    const out = document.getElementById('bookmarks-output');
    if(!out) return;
    if(State.bookmarks.length === 0) return out.innerHTML = `
        <div style="text-align:center; padding: 60px 20px; background:var(--surf); border-radius: 20px; border:1px dashed var(--border);">
            <i data-lucide="bookmark-minus" size="48" style="color:var(--text3); margin-bottom:15px"></i>
            <h3 style="color:var(--text2)">No bookmarks saved yet.</h3>
        </div>`;
    
    out.innerHTML = State.bookmarks.map(b => {
        const s = State.surahs.find(x => x.id === b.sid);
        return `<div class="s-card" onclick="App.load(${b.sid}, ${b.aid})">
            <div class="s-idx">${b.sid}:${b.aid}</div>
            <div style="flex:1">
                <div style="font-weight:700">${s ? s.name_simple : 'Unknown'}</div>
                <div style="font-size:0.8rem; color:var(--text3)">Go to verse</div>
            </div>
            <button class="nav-item" style="width:36px; height:36px; margin:0; background:rgba(255,0,0,0.1); color:#ef4444" onclick="event.stopPropagation(); App.mark(${b.sid}, ${b.aid}); Router.go('bookmarks');">
                <i data-lucide="trash-2" size="16"></i>
            </button>
        </div>`;
    }).join('');
    lucide.createIcons();
  }
};

// 4. Main App Controller
const App = {
  async init() {
    document.documentElement.setAttribute('data-theme', State.theme);
    AudioPlayer.init();
    
    // Hide side panel by default on mobile
    if(window.innerWidth <= 768) document.getElementById('side-panel').classList.add('collapsed');

    try {
      const r = await fetch('https://api.quran.com/api/v4/chapters');
      const d = await r.json();
      State.surahs = d.chapters;
      this.renderGrids();
      UI.renderRecent();
      lucide.createIcons();
    } catch(e) { UI.toast("Network error. Please refresh."); }
  },

  renderGrids() {
    const html = State.surahs.map(s => `
      <div class="s-card" onclick="App.load(${s.id})">
        <div class="s-idx">${s.id}</div>
        <div style="flex:1">
          <div style="font-weight:700">${s.name_simple}</div>
          <div style="font-size:0.75rem; color:var(--text3)">${s.verses_count} Ayahs • ${s.revelation_place}</div>
        </div>
        <div style="font-family:'Noto Naskh Arabic'; font-size:1.2rem; font-weight:700">${s.name_arabic}</div>
      </div>
    `).join('');
    
    const sideList = document.getElementById('side-list');
    const mainGrid = document.getElementById('main-grid');
    if (sideList) sideList.innerHTML = html;
    if (mainGrid) mainGrid.innerHTML = html;
  },

  async load(sid, scrollToAyah = 1) {
    Router.go('reader');
    const out = document.getElementById('reader-output');
    if (!out) return;
    out.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:50vh;"><div class="spin"><i data-lucide="loader-2" size="48" color="var(--accent)"></i></div></div>';
    lucide.createIcons();

    try {
      const [arR, enR] = await Promise.all([
        fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${sid}`),
        fetch(`https://api.quran.com/api/v4/quran/translations/131?chapter_number=${sid}`) // 131 is Saheeh International
      ]);
      
      const ar = await arR.json();
      const en = await enR.json();
      const info = State.surahs.find(x => x.id === sid);

      State.last = { id: sid, v: scrollToAyah };
      localStorage.setItem('zp-last', JSON.stringify(State.last));
      UI.renderRecent(); // Update home screen recent card immediately

      out.innerHTML = `
        <div class="reader-header">
            <div class="ar-title">${info.name_arabic}</div>
            <h1 style="font-family:'Crimson Pro'; font-size: 2.5rem; margin-bottom:8px">${info.name_simple}</h1>
            <p style="color:var(--text3); font-weight:600">${info.translated_name.name.toUpperCase()} • ${info.revelation_place.toUpperCase()}</p>
        </div>
        ${ar.verses.map((v, i) => {
            const isBookmarked = State.bookmarks.some(b => b.sid === sid && b.aid === (i+1));
            return `
          <div class="ayah-row ${AudioPlayer.track.s === sid && AudioPlayer.track.a === (i+1) && AudioPlayer.playing ? 'playing' : ''}" id="v-${sid}-${i+1}">
            <div class="ar-text">${v.text_uthmani}</div>
            <div class="en-text">${en.translations[i].text}</div>
            <div class="ayah-meta">
              <button class="nav-item" style="width:38px; height:38px; margin:0; background: var(--surf2);" onclick="AudioPlayer.play(${sid}, ${i+1})">
                <i data-lucide="play" size="16"></i>
              </button>
              <button class="nav-item" style="width:38px; height:38px; margin:0; background: var(--surf2); ${isBookmarked ? 'color:var(--accent);' : ''}" onclick="App.mark(${sid}, ${i+1}); this.style.color = this.style.color ? '' : 'var(--accent)';">
                <i data-lucide="bookmark" size="16"></i>
              </button>
              <span style="margin-left:auto; background:var(--surf2); padding:6px 14px; border-radius:20px;">Ayah ${i+1}</span>
            </div>
          </div>
        `}).join('')}
      `;
      lucide.createIcons();
      
      // Delay scrolling slightly to allow DOM to render
      setTimeout(() => {
          if(scrollToAyah > 1) {
              const el = document.getElementById(`v-${sid}-${scrollToAyah}`);
              if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          } else {
              document.getElementById('view-reader').scrollTo({top:0, behavior:'smooth'});
          }
      }, 100);

    } catch(e) { 
        out.innerHTML = `<div style="text-align:center; padding: 50px; color:var(--text3)">Failed to load Surah. Check your internet connection.</div>`; 
    }
  },

  mark(sid, aid) {
    const exists = State.bookmarks.findIndex(x => x.sid === sid && x.aid === aid);
    if(exists > -1) {
        State.bookmarks.splice(exists, 1);
        UI.toast("Bookmark removed");
    } else {
        State.bookmarks.push({sid, aid});
        UI.toast("Ayah bookmarked successfully");
    }
    localStorage.setItem('zp-favs', JSON.stringify(State.bookmarks));
  },

  filter(q) {
    const cards = document.querySelectorAll('#side-list .s-card');
    cards.forEach(c => {
        const text = c.textContent.toLowerCase();
        c.style.display = text.includes(q.toLowerCase()) ? 'flex' : 'none';
    });
  }
};

// Start the app
window.onload = () => App.init();
</script>
</body>
</html>
