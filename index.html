<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zenith Elite — The Ultimate Quran Experience</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;700&family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #030406; --surf: #0a0c10; --surf-glass: rgba(10, 12, 16, 0.7);
    --accent: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.3);
    --text: #f1f5f9; --text-muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.08);
    --grad: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
    --panel-w: 320px; --rail-w: 80px;
}

[data-theme="emerald"] { --accent: #10b981; --accent-glow: rgba(16, 185, 129, 0.3); --grad: linear-gradient(135deg, #10b981 0%, #059669 100%); }
[data-theme="sunset"] { --accent: #f59e0b; --accent-glow: rgba(245, 158, 11, 0.3); --grad: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* Layout Architecture */
#app-shell { display: flex; height: 100vh; width: 100vw; }

#nav-rail {
    width: var(--rail-w); background: var(--surf); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 30px 0; z-index: 100;
}

.logo-container {
    width: 50px; height: 50px; border-radius: 16px; background: var(--grad);
    display: flex; align-items: center; justify-content: center; margin-bottom: 40px;
    box-shadow: 0 0 20px var(--accent-glow); cursor: pointer; transition: 0.4s;
}
.logo-container:hover { transform: scale(1.1) rotate(5deg); }

.rail-item {
    width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center;
    justify-content: center; color: var(--text-muted); cursor: pointer; transition: 0.25s;
    margin-bottom: 12px; border: none; background: transparent;
}
.rail-item:hover, .rail-item.active { color: var(--accent); background: rgba(255,255,255,0.03); }
.rail-item.active { background: var(--accent-glow); box-shadow: inset 0 0 0 1px var(--border); }

/* Main Content Area */
#main-stage { flex: 1; position: relative; overflow: hidden; }
.view { position: absolute; inset: 0; padding: 40px; overflow-y: auto; scroll-behavior: smooth; display: none; }
.view.active { display: block; animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Bento Grid Dashboard */
.bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; }
.bento-card {
    background: var(--surf); border: 1px solid var(--border); border-radius: 24px; padding: 24px;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
}
.bento-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.02); transform: translateY(-5px); }
.bento-card.large { grid-column: span 2; }
.bento-card.tall { grid-row: span 2; }

/* Quran Reader Styles */
.reader-container { max-width: 800px; margin: 0 auto; padding-bottom: 150px; }
.surah-header { text-align: center; margin-bottom: 60px; padding: 40px; background: var(--accent-glow); border-radius: 32px; border: 1px solid var(--border); }
.sh-arabic { font-family: 'Scheherazade New', serif; font-size: 4.5rem; line-height: 1.2; margin-bottom: 10px; }
.sh-english { font-size: 1.8rem; font-weight: 700; color: var(--accent); letter-spacing: -1px; }

.ayah-strip {
    padding: 40px 0; border-bottom: 1px solid var(--border); transition: 0.4s;
    position: relative;
}
.ayah-strip.playing { background: linear-gradient(to right, transparent, var(--accent-glow), transparent); }
.ar-text { 
    font-family: 'Vazirmatn', sans-serif; font-size: 2.8rem; text-align: right; 
    direction: rtl; line-height: 2.4; margin-bottom: 25px; color: #fff;
}
.en-text { font-size: 1.15rem; color: var(--text-muted); line-height: 1.8; font-weight: 300; }

/* Global Floating Player */
#media-center {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 900px; height: 80px; background: var(--surf-glass);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 24px; z-index: 1000;
    display: flex; align-items: center; padding: 0 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.player-info { flex: 1; display: flex; align-items: center; gap: 15px; }
.player-controls { display: flex; align-items: center; gap: 25px; }
.play-btn { 
    width: 54px; height: 54px; border-radius: 50%; background: var(--grad); border: none;
    color: white; display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 10px 20px var(--accent-glow); transition: 0.3s;
}
.play-btn:hover { transform: scale(1.1); }

/* Sidebar List */
#surah-sidebar {
    position: fixed; right: -350px; top: 0; bottom: 0; width: 350px; background: var(--surf);
    border-left: 1px solid var(--border); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 200;
    padding: 30px;
}
#surah-sidebar.open { right: 0; }

.surah-item {
    padding: 16px; border-radius: 16px; display: flex; align-items: center; gap: 15px;
    cursor: pointer; transition: 0.2s; border: 1px solid transparent; margin-bottom: 8px;
}
.surah-item:hover { background: rgba(255,255,255,0.03); border-color: var(--border); }
.s-idx { width: 35px; height: 35px; border-radius: 10px; background: var(--accent-glow); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; }

@media (max-width: 768px) {
    #nav-rail { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0; }
    #media-center { bottom: 90px; width: 95%; padding: 0 15px; }
    .ar-text { font-size: 2.2rem; }
}
</style>
</head>
<body>

<div id="app-shell">
    <nav id="nav-rail">
        <div class="logo-container" onclick="UI.changeView('dashboard')">ز</div>
        <button class="rail-item active" id="btn-dashboard" onclick="UI.changeView('dashboard')"><i data-lucide="layout-grid"></i></button>
        <button class="rail-item" onclick="UI.toggleSidebar()"><i data-lucide="book-open"></i></button>
        <button class="rail-item" id="btn-bookmarks" onclick="UI.changeView('bookmarks')"><i data-lucide="bookmark"></i></button>
        <div style="flex: 1;"></div>
        <button class="rail-item" onclick="UI.toggleTheme()"><i data-lucide="palette"></i></button>
    </nav>

    <main id="main-stage">
        <section id="view-dashboard" class="view active">
            <div style="margin-bottom: 40px; text-align: center;">
                <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -2px;">Zenith <span style="color: var(--accent);">Elite</span></h1>
                <p style="color: var(--text-muted);">The most sophisticated way to experience the Noble Quran.</p>
            </div>
            
            <div class="bento-grid">
                <div class="bento-card large" style="background: var(--grad); color: white;">
                    <h3>Continue Reading</h3>
                    <p id="last-read-label" style="opacity: 0.8; margin-bottom: 20px;">Surah Al-Fatiha, Ayah 1</p>
                    <button onclick="App.resume()" style="padding: 10px 20px; border-radius: 12px; border: none; background: white; color: black; font-weight: 700; cursor: pointer;">Open Now</button>
                </div>
                <div class="bento-card tall">
                    <h3>Prayer Times</h3>
                    <div id="prayer-list" style="margin-top: 20px;">
                        <div style="color: var(--text-muted); text-align: center; padding-top: 40px;">Detecting location...</div>
                    </div>
                </div>
                <div class="bento-card">
                    <h3>Quick Search</h3>
                    <input type="text" placeholder="Type Surah name..." oninput="App.searchSurah(this.value)" style="width: 100%; margin-top: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white;">
                </div>
                <div class="bento-card">
                    <h3>Audio Reciter</h3>
                    <select onchange="Audio.reciter = this.value" style="width: 100%; margin-top: 15px; background: var(--bg); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 10px;">
                        <option value="Alafasy_64kbps">Mishary Alafasy</option>
                        <option value="Abdul_Basit_Murattal_64kbps">AbdulBaset Murattal</option>
                        <option value="Minshawi_Murattal_128kbps">Siddiq al-Minshawi</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="view-reader" class="view"></section>
    </main>

    <aside id="surah-sidebar">
        <h2 style="margin-bottom: 25px;">Surah Index</h2>
        <div id="sidebar-list" style="height: calc(100% - 60px); overflow-y: auto;"></div>
    </aside>
</div>

<footer id="media-center">
    <div class="player-info">
        <div id="p-idx" class="s-idx" style="width: 45px; height: 45px;">1</div>
        <div>
            <div id="p-title" style="font-weight: 700;">Select Ayah</div>
            <div id="p-sub" style="font-size: 0.8rem; color: var(--text-muted);">Not playing</div>
        </div>
    </div>
    <div class="player-controls">
        <button class="rail-item" onclick="Audio.prev()"><i data-lucide="skip-back"></i></button>
        <button class="play-btn" onclick="Audio.toggle()" id="master-play"><i data-lucide="play"></i></button>
        <button class="rail-item" onclick="Audio.next()"><i data-lucide="skip-forward"></i></button>
    </div>
    <div style="flex: 1; display: flex; justify-content: flex-end; font-family: monospace; color: var(--accent);" id="p-timer">0:00</div>
</footer>

<script>
const State = {
    surahs: [],
    currentID: null,
    history: JSON.parse(localStorage.getItem('zenith_history')) || { id: 1, ayah: 1 },
    theme: localStorage.getItem('zenith_theme') || 'midnight'
};

const Audio = {
    player: new Audio(),
    isPlaying: false,
    reciter: 'Alafasy_64kbps',
    current: { s: 0, a: 0 },

    init() {
        this.player.ontimeupdate = () => {
            const m = Math.floor(this.player.currentTime / 60);
            const s = Math.floor(this.player.currentTime % 60);
            document.getElementById('p-timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        };
        this.player.onended = () => this.next();
    },

    play(s, a) {
        this.current = { s, a };
        const sid = String(s).padStart(3, '0');
        const aid = String(a).padStart(3, '0');
        this.player.src = `https://everyayah.com/data/${this.reciter}/${sid}${aid}.mp3`;
        this.player.play();
        this.isPlaying = true;
        this.syncUI();
    },

    toggle() {
        if(!this.player.src) return;
        this.isPlaying ? this.player.pause() : this.player.play();
        this.isPlaying = !this.isPlaying;
        this.syncUI();
    },

    syncUI() {
        const s = State.surahs.find(x => x.id === this.current.s);
        document.getElementById('p-title').textContent = s ? s.name_simple : 'Noble Quran';
        document.getElementById('p-sub').textContent = `Ayah ${this.current.a}`;
        document.getElementById('p-idx').textContent = this.current.s;
        document.querySelector('#master-play i').setAttribute('data-lucide', this.isPlaying ? 'pause' : 'play');
        
        document.querySelectorAll('.ayah-strip').forEach(el => el.classList.remove('playing'));
        const active = document.getElementById(`ay-${this.current.s}-${this.current.a}`);
        if(active) {
            active.classList.add('playing');
            active.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        lucide.createIcons();
    },

    next() {
        const s = State.surahs.find(x => x.id === this.current.s);
        if(s && this.current.a < s.verses_count) this.play(this.current.s, this.current.a + 1);
    },
    prev() { if(this.current.a > 1) this.play(this.current.s, this.current.a - 1); }
};

const UI = {
    changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.rail-item').forEach(r => r.classList.remove('active'));
        document.getElementById(`view-${id}`).classList.add('active');
        document.getElementById(`btn-${id}`)?.classList.add('active');
        document.getElementById('surah-sidebar').classList.remove('open');
    },
    toggleSidebar() { document.getElementById('surah-sidebar').classList.toggle('open'); },
    toggleTheme() {
        const themes = ['midnight', 'emerald', 'sunset'];
        let next = themes[(themes.indexOf(State.theme) + 1) % themes.length];
        State.theme = next;
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('zenith_theme', next);
    }
};

const App = {
    async init() {
        Audio.init();
        document.documentElement.setAttribute('data-theme', State.theme);
        try {
            const r = await fetch('https://api.quran.com/api/v4/chapters');
            const d = await r.json();
            State.surahs = d.chapters;
            this.renderLists();
            this.getPrayerTimes();
        } catch(e) { console.error("API Error", e); }
        lucide.createIcons();
    },

    renderLists() {
        const html = State.surahs.map(s => `
            <div class="surah-item" onclick="App.loadSurah(${s.id})">
                <div class="s-idx">${s.id}</div>
                <div style="flex: 1;">
                    <div style="font-weight: 700;">${s.name_simple}</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">${s.verses_count} Verses</div>
                </div>
                <div style="font-family: 'Scheherazade New'; font-size: 1.4rem;">${s.name_arabic}</div>
            </div>
        `).join('');
        document.getElementById('sidebar-list').innerHTML = html;
        document.getElementById('last-read-label').textContent = `Surah ${State.history.id}, Ayah ${State.history.ayah}`;
    },

    async loadSurah(id) {
        UI.changeView('reader');
        const view = document.getElementById('view-reader');
        view.innerHTML = `<div style="text-align:center; padding-top:100px;"><i data-lucide="loader-2" class="spin"></i></div>`;
        lucide.createIcons();

        try {
            const [arR, enR] = await Promise.all([
                fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`),
                fetch(`https://api.quran.com/api/v4/quran/translations/131?chapter_number=${id}`)
            ]);
            const ar = await arR.json();
            const en = await enR.json();
            const s = State.surahs.find(x => x.id === id);

            view.innerHTML = `
                <div class="reader-container">
                    <div class="surah-header">
                        <div class="sh-arabic">${s.name_arabic}</div>
                        <div class="sh-english">${s.name_simple}</div>
                        <div style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem;">${s.revelation_place} • ${s.verses_count} Verses</div>
                    </div>
                    ${ar.verses.map((v, i) => `
                        <div class="ayah-strip" id="ay-${id}-${i+1}">
                            <div class="ar-text">${v.text_uthmani}</div>
                            <div class="en-text">${en.translations[i].text}</div>
                            <div style="margin-top: 25px; display: flex; gap: 15px;">
                                <button class="rail-item" style="width: 35px; height: 35px;" onclick="Audio.play(${id}, ${i+1})"><i data-lucide="play" size="16"></i></button>
                                <span style="font-size: 0.8rem; color: var(--text-muted); align-self: center;">Ayah ${i+1}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            State.history = { id, ayah: 1 };
            localStorage.setItem('zenith_history', JSON.stringify(State.history));
            lucide.createIcons();
            view.scrollTo(0,0);
        } catch(e) { view.innerHTML = "Error loading verses."; }
    },

    resume() { this.loadSurah(State.history.id); },

    getPrayerTimes() {
        navigator.geolocation.getCurrentPosition(async (p) => {
            const r = await fetch(`https://api.aladhan.com/v1/timings?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&method=2`);
            const d = await r.json();
            const t = d.data.timings;
            document.getElementById('prayer-list').innerHTML = `
                ${['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].map(p => `
                    <div style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid var(--border);">
                        <span>${p}</span><span style="color:var(--accent); font-weight:700;">${t[p]}</span>
                    </div>
                `).join('')}
            `;
        });
    }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
