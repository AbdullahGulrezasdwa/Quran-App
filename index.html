<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Pro — القرآن الكريم</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080c14'/%3E%3Ccircle cx='14' cy='16' r='8' fill='%2338bdf8'/%3E%3Ccircle cx='17.5' cy='13' r='6' fill='%23080c14'/%3E%3Cpolygon points='24,6 24.9,8.7 27.6,8.7 25.4,10.4 26.3,13 24,11.3 21.7,13 22.6,10.4 20.4,8.7 23.1,8.7' fill='%2338bdf8'/%3E%3C/svg%3E">
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;700&family=Amiri+Quran&display=swap" rel="stylesheet">
<style>
:root {
  --rail-w: 72px; --panel-w: 320px; --hud-h: 85px;
  --t: 0.2s cubic-bezier(0.4,0,0.2,1);
  --ar-size: 2.2rem; --en-size: 1rem;
}

[data-theme="midnight"] {
  --bg: #080c14; --surf: #0f172a; --surf2: #1e293b; --surf3: #334155;
  --text: #f8fafc; --text2: #cbd5e1; --text3: #64748b;
  --border: rgba(255,255,255,0.08); --accent: #38bdf8; --accent-rgb: 56,189,248;
  --gradient: linear-gradient(135deg, #38bdf8, #818cf8);
}

[data-theme="emerald"] {
  --bg: #022c22; --surf: #064e3b; --surf2: #065f46; --surf3: #047857;
  --text: #ecfdf5; --text2: #a7f3d0; --text3: #34d399;
  --border: rgba(255,255,255,0.1); --accent: #10b981; --accent-rgb: 16,185,129;
  --gradient: linear-gradient(135deg, #10b981, #34d399);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* Progress Bar */
#progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); z-index: 1000; }
#progress-bar { height: 100%; width: 0%; background: var(--gradient); transition: width 0.3s; }

/* Layout */
#rail { position: fixed; left: 0; top: 0; bottom: 0; width: var(--rail-w); background: var(--surf); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100; }
.rail-logo { width: 44px; height: 44px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; margin-bottom: 24px; cursor: pointer; }
.rail-btn { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); margin-bottom: 8px; border: none; background: transparent; transition: all var(--t); }
.rail-btn:hover, .rail-btn.active { color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }

.panel { position: fixed; left: var(--rail-w); top: 0; bottom: 0; width: var(--panel-w); background: var(--surf); border-right: 1px solid var(--border); overflow-y: auto; z-index: 90; transition: transform var(--t); }
.panel.hidden { transform: translateX(-110%); }
.panel-header { padding: 24px; background: var(--surf); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }

#main { margin-left: var(--rail-w); min-height: 100vh; padding-bottom: var(--hud-h); transition: margin var(--t); }
#main.shifted { margin-left: calc(var(--rail-w) + var(--panel-w)); }

/* Components */
.search-input { width: 100%; padding: 12px 16px; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; }
.surah-card { padding: 16px; border-radius: 12px; background: var(--surf); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all var(--t); margin: 8px 16px; }
.surah-card:hover { transform: translateY(-2px); border-color: var(--accent); background: var(--surf2); }
.s-num { width: 32px; height: 32px; border-radius: 8px; background: var(--surf3); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }

.ayah-box { padding: 30px; border-bottom: 1px solid var(--border); max-width: 900px; margin: 0 auto; position: relative; }
.ayah-box:hover { background: rgba(255,255,255,0.01); }
.ar-text { font-family: 'Amiri Quran', serif; font-size: var(--ar-size); text-align: right; direction: rtl; line-height: 2.5; margin-bottom: 15px; }
.en-text { font-size: var(--en-size); color: var(--text2); line-height: 1.6; font-weight: 300; }

/* HUD / Player */
#hud { position: fixed; bottom: 0; left: 0; right: 0; height: var(--hud-h); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 200; }
.player-info { display: flex; flex-direction: column; }
.player-controls { display: flex; gap: 12px; align-items: center; }
.p-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); background: var(--surf2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.p-btn-main { width: 52px; height: 52px; background: var(--gradient); border: none; color: white; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 10px 20px; border-radius: 20px; font-weight: 600; z-index: 1000; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>

<div id="rail">
  <div class="rail-logo">Z</div>
  <button class="rail-btn active" onclick="App.showHome()"><i data-lucide="home"></i></button>
  <button class="rail-btn" onclick="App.togglePanel()"><i data-lucide="search"></i></button>
  <button class="rail-btn" onclick="App.showAdhan()"><i data-lucide="clock"></i></button>
  <div style="flex:1"></div>
  <button class="rail-btn" onclick="App.toggleTheme()"><i data-lucide="palette"></i></button>
</div>

<div id="panel" class="panel hidden">
  <div class="panel-header">
    <input type="text" class="search-input" placeholder="Search Surah..." oninput="App.filterSurahs(this.value)">
  </div>
  <div id="panel-list"></div>
</div>

<div id="main">
  <div id="view-home" style="padding: 40px;">
    <h1 style="font-family:'Crimson Pro'; font-size: 3rem; margin-bottom: 10px;">Zenith Pro</h1>
    <p style="color:var(--text3); margin-bottom: 30px;">Continue your spiritual journey.</p>
    <div id="last-read-card"></div>
    <h3 style="margin: 40px 0 20px;">Quick Browse</h3>
    <div id="home-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div>
  </div>
  
  <div id="view-reader" style="display:none;">
    <div id="reader-meta" style="padding: 60px 20px; text-align:center; border-bottom: 1px solid var(--border);"></div>
    <div id="reader-content"></div>
  </div>
</div>

<div id="hud">
  <div class="player-info">
    <span id="p-surah" style="font-weight:700; font-size:0.9rem;">Not Playing</span>
    <span id="p-ayah" style="color:var(--text3); font-size:0.75rem;">Select an ayah to begin</span>
  </div>
  <div class="player-controls">
    <button class="p-btn" onclick="Audio.prev()"><i data-lucide="skip-back"></i></button>
    <button class="p-btn p-btn-main" id="play-pause" onclick="Audio.toggle()"><i data-lucide="play"></i></button>
    <button class="p-btn" onclick="Audio.next()"><i data-lucide="skip-forward"></i></button>
  </div>
  <div style="width: 100px; display: flex; justify-content: flex-end;">
    <button class="p-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})"><i data-lucide="arrow-up"></i></button>
  </div>
</div>

<script>
const State = {
  surahs: [],
  currentSurah: null,
  theme: localStorage.getItem('zp-theme') || 'midnight',
  last: JSON.parse(localStorage.getItem('zp-last')) || null
};

const Audio = {
  player: new Audio(),
  isPlaying: false,
  meta: { s: 0, a: 0 },
  
  init() {
    this.player.onended = () => this.next();
    this.player.ontimeupdate = () => {
      const p = (this.player.currentTime / this.player.duration) * 100;
      document.getElementById('progress-bar').style.width = p + '%';
    };
  },
  
  play(s, a) {
    this.meta = { s, a };
    const sid = String(s).padStart(3, '0');
    const aid = String(a).padStart(3, '0');
    this.player.src = `https://everyayah.com/data/Alafasy_64kbps/${sid}${aid}.mp3`;
    this.player.play();
    this.isPlaying = true;
    this.updateUI();
  },

  toggle() {
    if(!this.player.src) return;
    this.isPlaying ? this.player.pause() : this.player.play();
    this.isPlaying = !this.isPlaying;
    this.updateUI();
  },

  updateUI() {
    const sName = State.surahs.find(x => x.id === this.meta.s)?.name_simple || "Quran";
    document.getElementById('p-surah').textContent = sName;
    document.getElementById('p-ayah').textContent = `Ayah ${this.meta.a}`;
    document.getElementById('play-pause').innerHTML = `<i data-lucide="${this.isPlaying ? 'pause' : 'play'}"></i>`;
    lucide.createIcons();
  },

  next() {
    const s = State.surahs.find(x => x.id === this.meta.s);
    if(this.meta.a < s.verses_count) this.play(this.meta.s, this.meta.a + 1);
  },
  prev() {
    if(this.meta.a > 1) this.play(this.meta.s, this.meta.a - 1);
  }
};

const App = {
  async init() {
    document.documentElement.setAttribute('data-theme', State.theme);
    Audio.init();
    try {
      const r = await fetch('https://api.quran.com/api/v4/chapters');
      const d = await r.json();
      State.surahs = d.chapters;
      this.renderSurahLists();
      this.renderLastRead();
      lucide.createIcons();
    } catch(e) { this.toast("Connection Error"); }
  },

  renderSurahLists() {
    const html = State.surahs.map(s => `
      <div class="surah-card" onclick="App.loadSurah(${s.id})">
        <div class="s-num">${s.id}</div>
        <div style="flex:1">
          <div style="font-weight:700">${s.name_simple}</div>
          <div style="font-size:0.7rem; color:var(--text3)">${s.revelation_place} • ${s.verses_count} Verses</div>
        </div>
        <div style="font-family:'Noto Naskh Arabic'; font-size:1.1rem">${s.name_arabic}</div>
      </div>
    `).join('');
    document.getElementById('panel-list').innerHTML = html;
    document.getElementById('home-grid').innerHTML = html;
  },

  renderLastRead() {
    const container = document.getElementById('last-read-card');
    if(!State.last) {
      container.innerHTML = `<div class="surah-card" style="background:var(--surf2)">Select a Surah to begin tracking progress</div>`;
      return;
    }
    const s = State.surahs.find(x => x.id === State.last.id);
    container.innerHTML = `
      <div class="surah-card" style="background:var(--gradient); color:white; border:none;" onclick="App.loadSurah(${s.id})">
        <div class="s-num" style="background:rgba(255,255,255,0.2); color:white">${s.id}</div>
        <div style="flex:1">
          <div style="font-weight:700">Continue Reading</div>
          <div style="font-size:0.8rem; opacity:0.9">${s.name_simple} — Chapter ${s.id}</div>
        </div>
        <i data-lucide="arrow-right"></i>
      </div>
    `;
    lucide.createIcons();
  },

  async loadSurah(id) {
    this.showView('reader');
    const content = document.getElementById('reader-content');
    const meta = document.getElementById('reader-meta');
    content.innerHTML = '<div style="text-align:center; padding:50px;"><i data-lucide="loader" class="spin"></i></div>';
    lucide.createIcons();

    try {
      const [arR, enR] = await Promise.all([
        fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`),
        fetch(`https://api.quran.com/api/v4/quran/translations/131?chapter_number=${id}`)
      ]);
      
      const arData = await arR.json();
      const enData = await enR.json();
      const info = State.surahs.find(x => x.id === id);

      State.last = { id };
      localStorage.setItem('zp-last', JSON.stringify(State.last));

      meta.innerHTML = `
        <h1 style="font-family:'Amiri Quran'; font-size:3rem; margin-bottom:10px;">${info.name_arabic}</h1>
        <h2 style="font-family:'Crimson Pro'; font-weight:400; color:var(--accent)">${info.name_simple}</h2>
        <p style="color:var(--text3); margin-top:10px">${info.translated_name.name} • ${info.revelation_place}</p>
      `;

      content.innerHTML = arData.verses.map((v, i) => `
        <div class="ayah-box" id="a-${id}-${i+1}">
          <div class="ar-text">${v.text_uthmani}</div>
          <div class="en-text">${enData.translations[i].text}</div>
          <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="rail-btn" style="width:32px; height:32px;" onclick="Audio.play(${id}, ${i+1})">
              <i data-lucide="play" style="width:16px;"></i>
            </button>
            <span style="font-size:0.7rem; color:var(--text3); padding-top:8px;">AYAH ${i+1}</span>
          </div>
        </div>
      `).join('');
      
      lucide.createIcons();
      window.scrollTo(0,0);
    } catch(e) { this.toast("Failed to load verses"); }
  },

  showView(v) {
    document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
    document.getElementById('view-reader').style.display = v === 'reader' ? 'block' : 'none';
    if(v === 'home') this.renderLastRead();
  },

  showHome() { this.showView('home'); },
  
  togglePanel() { 
    document.getElementById('panel').classList.toggle('hidden');
    document.getElementById('main').classList.toggle('shifted');
  },

  toggleTheme() {
    State.theme = State.theme === 'midnight' ? 'emerald' : 'midnight';
    document.documentElement.setAttribute('data-theme', State.theme);
    localStorage.setItem('zp-theme', State.theme);
  },

  filterSurahs(q) {
    const cards = document.querySelectorAll('#panel-list .surah-card');
    cards.forEach(c => {
      c.style.display = c.textContent.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none';
    });
  },

  toast(m) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = m;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
};

window.onload = () => App.init();
</script>
</body>
</html>
